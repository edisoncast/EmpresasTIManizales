name: Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  DIST_DIR: dist
  SITE_URL: https://ticmanizales.edisoncastrosanchez.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate, test and build
        run: |
          npm run validate:data
          npm run audit:data
          npm run lint
          npm run test
          npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets
        run: |
          aws s3 sync "$DIST_DIR/_astro" "s3://${{ secrets.S3_BUCKET_NAME }}/_astro" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync mutable documents
        run: |
          aws s3 sync "$DIST_DIR" "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "_astro/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Smoke test (producción)
        run: |
          set -u
          echo "Esperando propagación de la invalidación de CloudFront…"
          sleep 20
          fail=0
          for r in / /empresas /universidades /programas /personas /comunidades /eventos /ecosistema /contribuir /acerca; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --retry 4 --retry-delay 5 --retry-all-errors "$SITE_URL$r")
            if [ "$code" = "200" ]; then echo "OK   $code  $r"; else echo "FAIL $code  $r"; fail=1; fi
          done
          # El manejo de rutas inexistentes debe devolver 404
          code=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL/ruta-inexistente-smoke-test")
          if [ "$code" = "404" ]; then echo "OK   404  (ruta inexistente)"; else echo "FAIL $code  (esperaba 404)"; fail=1; fi
          if [ "$fail" -ne 0 ]; then echo "::error::Smoke test falló: alguna ruta no respondió como se esperaba"; fi
          exit $fail

      - name: Deployment summary
        run: |
          echo "### Deployment completed" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: production" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: ${{ secrets.S3_BUCKET_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- CloudFront Distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_STEP_SUMMARY
